<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대학생 학점 계산기</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f5f6fa;
      color: #222;
      min-height: 100vh;
      padding: 32px 18px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    header p {
      color: #666;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      border: 1px solid #eceef3;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    form {
      display: grid;
      grid-template-columns: 1.5fr 0.7fr 1fr auto;
      gap: 10px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #555;
    }

    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #d8dce5;
      padding: 12px 13px;
      font-size: 15px;
      background: #fff;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4b6fff;
      box-shadow: 0 0 0 3px rgba(75, 111, 255, 0.12);
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: 0.15s ease;
    }

    .add-button {
      align-self: end;
      background: #4b6fff;
      color: #fff;
    }

    .add-button:hover {
      background: #3657db;
    }

    .clear-button {
      background: #f1f2f6;
      color: #555;
      margin-top: 12px;
    }

    .clear-button:hover {
      background: #e4e6ef;
    }

    .course-list {
      display: grid;
      gap: 10px;
    }

    .empty-message {
      color: #888;
      background: #f8f9fc;
      border: 1px dashed #d8dce5;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
    }

    .course-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 12px;
      align-items: center;
      border: 1px solid #eceef3;
      border-radius: 14px;
      padding: 14px;
      background: #fbfcff;
    }

    .course-name {
      font-weight: 800;
      word-break: break-word;
    }

    .course-meta {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }

    .badge {
      min-width: 64px;
      text-align: center;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 14px;
      font-weight: 800;
      background: #eef2ff;
      color: #3657db;
    }

    .delete-button {
      width: auto;
      padding: 8px 11px;
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #ffd0d0;
    }

    .delete-button:hover {
      background: #ffe2e2;
    }

    .summary-card {
      position: sticky;
      top: 22px;
    }

    .total-input-box {
      margin-bottom: 18px;
    }

    .summary-grid {
      display: grid;
      gap: 12px;
    }

    .summary-item {
      background: #f8f9fc;
      border-radius: 14px;
      padding: 15px;
      border: 1px solid #eceef3;
    }

    .summary-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
    }

    .summary-value {
      font-size: 26px;
      font-weight: 900;
    }

    .remaining {
      color: #4b6fff;
    }

    .done {
      color: #1f9d55;
    }

    .progress-wrap {
      margin-top: 16px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
      margin-bottom: 7px;
    }

    .progress-bar {
      height: 12px;
      background: #edf0f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #4b6fff;
      transition: width 0.2s ease;
    }

    .note {
      margin-top: 16px;
      color: #777;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .summary-card {
        position: static;
        order: -1;
      }

      form {
        grid-template-columns: 1fr;
      }

      .course-item {
        grid-template-columns: 1fr;
      }

      .badge {
        width: fit-content;
      }

      .delete-button {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>대학생 학점 계산기</h1>
      <p>들은 과목을 입력하면 현재까지 이수한 학점, 4.3 만점 기준 평점, 졸업까지 남은 학점을 자동으로 계산합니다.</p>
    </header>

    <section class="layout">
      <section class="card">
        <h2>들은 과목 입력</h2>

        <form id="courseForm">
          <div>
            <label for="courseName">강의명</label>
            <input id="courseName" type="text" placeholder="예: 회로이론" required />
          </div>

          <div>
            <label for="credit">학점</label>
            <input id="credit" type="number" min="0.5" step="0.5" placeholder="예: 3" required />
          </div>

          <div>
            <label for="grade">점수</label>
            <select id="grade" required>
              <option value="4.3">A+ (4.3)</option>
              <option value="4.0">A0 (4.0)</option>
              <option value="3.7">A- (3.7)</option>
              <option value="3.3">B+ (3.3)</option>
              <option value="3.0">B0 (3.0)</option>
              <option value="2.7">B- (2.7)</option>
              <option value="2.3">C+ (2.3)</option>
              <option value="2.0">C0 (2.0)</option>
              <option value="1.7">C- (1.7)</option>
              <option value="1.3">D+ (1.3)</option>
              <option value="1.0">D0 (1.0)</option>
              <option value="0.7">D- (0.7)</option>
              <option value="0">F (0.0)</option>
            </select>
          </div>

          <button class="add-button" type="submit">추가</button>
        </form>

        <div id="courseList" class="course-list"></div>
      </section>

      <aside class="card summary-card">
        <h2>졸업 학점 현황</h2>

        <div class="total-input-box">
          <label for="requiredCredits">졸업까지 필요한 총학점</label>
          <input id="requiredCredits" type="number" min="0" step="1" value="130" />
        </div>

        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-label">입력된 총 이수학점</div>
            <div id="completedCredits" class="summary-value">0</div>
          </div>

          <div class="summary-item">
            <div class="summary-label">남은 학점</div>
            <div id="remainingCredits" class="summary-value remaining">130</div>
          </div>

          <div class="summary-item">
            <div class="summary-label">평균 평점 / 4.3</div>
            <div id="gpa" class="summary-value">0.00</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-text">
            <span>졸업학점 진행률</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <button id="clearButton" class="clear-button" type="button">전체 삭제</button>

        <p class="note">
          입력한 과목 정보는 현재 브라우저에 자동 저장됩니다. 같은 브라우저에서 다시 열면 이전 입력값이 유지됩니다.
        </p>
      </aside>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "collegeCreditCalculatorCourses";
    const REQUIRED_KEY = "collegeCreditCalculatorRequiredCredits";

    const courseForm = document.getElementById("courseForm");
    const courseNameInput = document.getElementById("courseName");
    const creditInput = document.getElementById("credit");
    const gradeSelect = document.getElementById("grade");
    const requiredCreditsInput = document.getElementById("requiredCredits");
    const courseList = document.getElementById("courseList");
    const completedCreditsEl = document.getElementById("completedCredits");
    const remainingCreditsEl = document.getElementById("remainingCredits");
    const gpaEl = document.getElementById("gpa");
    const progressPercentEl = document.getElementById("progressPercent");
    const progressFillEl = document.getElementById("progressFill");
    const clearButton = document.getElementById("clearButton");

    let courses = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    const savedRequiredCredits = localStorage.getItem(REQUIRED_KEY);

    if (savedRequiredCredits !== null) {
      requiredCreditsInput.value = savedRequiredCredits;
    }

    function getGradeText(value) {
      const selectedOption = [...gradeSelect.options].find(option => Number(option.value) === Number(value));
      return selectedOption ? selectedOption.textContent : `${Number(value).toFixed(1)}점`;
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(courses));
      localStorage.setItem(REQUIRED_KEY, requiredCreditsInput.value || "0");
    }

    function calculateSummary() {
      const requiredCredits = Number(requiredCreditsInput.value) || 0;
      const completedCredits = courses.reduce((sum, course) => sum + Number(course.credit), 0);
      const weightedScore = courses.reduce((sum, course) => sum + Number(course.credit) * Number(course.grade), 0);
      const gpa = completedCredits > 0 ? weightedScore / completedCredits : 0;
      const remainingCredits = Math.max(requiredCredits - completedCredits, 0);
      const progress = requiredCredits > 0 ? Math.min((completedCredits / requiredCredits) * 100, 100) : 0;

      completedCreditsEl.textContent = completedCredits.toFixed(1).replace(".0", "");
      remainingCreditsEl.textContent = remainingCredits.toFixed(1).replace(".0", "");
      gpaEl.textContent = gpa.toFixed(2);
      progressPercentEl.textContent = `${progress.toFixed(1).replace(".0", "")}%`;
      progressFillEl.style.width = `${progress}%`;

      if (remainingCredits === 0 && requiredCredits > 0) {
        remainingCreditsEl.classList.add("done");
        remainingCreditsEl.classList.remove("remaining");
      } else {
        remainingCreditsEl.classList.add("remaining");
        remainingCreditsEl.classList.remove("done");
      }
    }

    function renderCourses() {
      courseList.innerHTML = "";

      if (courses.length === 0) {
        courseList.innerHTML = '<div class="empty-message">아직 입력된 과목이 없습니다. 위 입력창에서 과목을 추가하세요.</div>';
        calculateSummary();
        return;
      }

      courses.forEach((course, index) => {
        const item = document.createElement("div");
        item.className = "course-item";

        item.innerHTML = `
          <div>
            <div class="course-name">${escapeHTML(course.name)}</div>
            <div class="course-meta">${Number(course.credit).toFixed(1).replace(".0", "")}학점 · ${getGradeText(course.grade)}</div>
          </div>
          <div class="badge">${Number(course.credit).toFixed(1).replace(".0", "")}학점</div>
          <div class="badge">${Number(course.grade).toFixed(1)}</div>
          <button class="delete-button" type="button" data-index="${index}">삭제</button>
        `;

        courseList.appendChild(item);
      });

      calculateSummary();
    }

    function escapeHTML(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    courseForm.addEventListener("submit", event => {
      event.preventDefault();

      const name = courseNameInput.value.trim();
      const credit = Number(creditInput.value);
      const grade = Number(gradeSelect.value);

      if (!name || credit <= 0 || Number.isNaN(grade)) {
        alert("강의명, 학점, 점수를 올바르게 입력하세요.");
        return;
      }

      courses.push({ name, credit, grade });
      saveData();
      renderCourses();

      courseForm.reset();
      gradeSelect.value = "4.3";
      courseNameInput.focus();
    });

    courseList.addEventListener("click", event => {
      if (!event.target.classList.contains("delete-button")) return;

      const index = Number(event.target.dataset.index);
      courses.splice(index, 1);
      saveData();
      renderCourses();
    });

    requiredCreditsInput.addEventListener("input", () => {
      saveData();
      calculateSummary();
    });

    clearButton.addEventListener("click", () => {
      const confirmed = confirm("입력된 과목을 모두 삭제할까요?");
      if (!confirmed) return;

      courses = [];
      saveData();
      renderCourses();
    });

    renderCourses();
  </script>
</body>
</html>
