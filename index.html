<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대학생 학점 계산기</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f7faff;
      color: #222;
      min-height: 100vh;
      padding: 32px 18px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    header p {
      color: #666;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      border: 1px solid #eceef3;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    form {
      display: grid;
      grid-template-columns: 1.5fr 0.7fr 1fr auto;
      gap: 10px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #555;
    }

    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #d8dce5;
      padding: 12px 13px;
      font-size: 15px;
      background: #fff;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: 0.15s ease;
    }

    .add-button {
      align-self: end;
      background: #2563eb;
      color: #fff;
    }

    .add-button:hover {
      background: #1d4ed8;
    }

    .clear-button {
      background: #f1f2f6;
      color: #555;
      margin-top: 12px;
    }

    .clear-button:hover {
      background: #e4e6ef;
    }

    .course-list {
      display: grid;
      gap: 10px;
    }

    .empty-message {
      color: #888;
      background: #f8f9fc;
      border: 1px dashed #d8dce5;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
    }

    .course-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 12px;
      align-items: center;
      border: 1px solid #eceef3;
      border-radius: 14px;
      padding: 14px;
      background: #fbfcff;
    }

    .course-name {
      font-weight: 800;
      word-break: break-word;
    }

    .course-meta {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }

    .badge {
      min-width: 64px;
      text-align: center;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 14px;
      font-weight: 800;
      background: #eef2ff;
      color: #1d4ed8;
    }

    .delete-button {
      width: auto;
      padding: 8px 11px;
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #ffd0d0;
    }

    .delete-button:hover {
      background: #ffe2e2;
    }

    .summary-card {
      position: sticky;
      top: 22px;
    }

    .total-input-box,
    .scale-box {
      margin-bottom: 18px;
    }

    .summary-grid {
      display: grid;
      gap: 12px;
    }

    .summary-item {
      background: #f8f9fc;
      border-radius: 14px;
      padding: 15px;
      border: 1px solid #eceef3;
    }

    .summary-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
    }

    .summary-value {
      font-size: 26px;
      font-weight: 900;
    }

    .remaining {
      color: #2563eb;
    }

    .done {
      color: #1f9d55;
    }

    .progress-wrap {
      margin-top: 16px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
      margin-bottom: 7px;
    }

    .progress-bar {
      height: 12px;
      background: #edf0f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width 0.2s ease;
    }

    .note {
      margin-top: 16px;
      color: #777;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .summary-card {
        position: static;
        order: -1;
      }

      form {
        grid-template-columns: 1fr;
      }

      .course-item {
        grid-template-columns: 1fr;
      }

      .badge,
      .delete-button {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>대학생 학점 계산기</h1>
      <p>들은 과목을 입력하면 현재까지 이수한 학점, 선택한 만점 기준 평점, 졸업까지 남은 학점을 자동으로 계산합니다.</p>
    </header>

    <section class="layout">
      <section class="card">
        <h2>들은 과목 입력</h2>

        <form id="courseForm">
          <div>
            <label for="courseName">강의명</label>
            <input id="courseName" type="text" placeholder="예: 회로이론" required />
          </div>

          <div>
            <label for="credit">학점</label>
            <input id="credit" type="number" min="0.5" step="0.5" placeholder="예: 3" required />
          </div>

          <div>
            <label for="grade">점수</label>
            <select id="grade" required></select>
          </div>

          <button class="add-button" type="submit">추가</button>
        </form>

        <div id="courseList" class="course-list"></div>
      </section>

      <aside class="card summary-card">
        <h2>졸업 학점 현황</h2>

        <div class="total-input-box">
          <label for="requiredCredits">졸업까지 필요한 총학점</label>
          <input id="requiredCredits" type="number" min="0" step="1" value="130" />
        </div>

        <div class="scale-box">
          <label for="gradeScale">평점 만점 기준</label>
          <select id="gradeScale">
            <option value="4.3">4.3 만점</option>
            <option value="4.0">4.0 만점</option>
            <option value="4.5">4.5 만점</option>
          </select>
        </div>

        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-label">입력된 총 이수학점</div>
            <div id="completedCredits" class="summary-value">0</div>
          </div>

          <div class="summary-item">
            <div class="summary-label">남은 학점</div>
            <div id="remainingCredits" class="summary-value remaining">130</div>
          </div>

          <div class="summary-item">
            <div class="summary-label">평균 평점</div>
            <div id="gpa" class="summary-value">0.00</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-text">
            <span>졸업학점 진행률</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <button id="clearButton" class="clear-button" type="button">전체 삭제</button>

        <p class="note">
          입력한 과목 정보와 평점 기준은 현재 브라우저에 자동 저장됩니다. 같은 브라우저에서 다시 열면 이전 입력값이 유지됩니다.
        </p>
      </aside>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "collegeCreditCalculatorCourses";
    const REQUIRED_KEY = "collegeCreditCalculatorRequiredCredits";
    const SCALE_KEY = "collegeCreditCalculatorGradeScale";

    // 만점 기준별 성적표입니다.
    // 학교마다 환산표가 다를 수 있으므로, 필요하면 이 부분만 수정하면 됩니다.
    const gradeTables = {
      "4.3": [
        { letter: "A+", point: 4.3 },
        { letter: "A0", point: 4.0 },
        { letter: "A-", point: 3.7 },
        { letter: "B+", point: 3.3 },
        { letter: "B0", point: 3.0 },
        { letter: "B-", point: 2.7 },
        { letter: "C+", point: 2.3 },
        { letter: "C0", point: 2.0 },
        { letter: "C-", point: 1.7 },
        { letter: "D+", point: 1.3 },
        { letter: "D0", point: 1.0 },
        { letter: "D-", point: 0.7 },
        { letter: "F", point: 0.0 }
      ],
      "4.0": [
        { letter: "A+", point: 4.0 },
        { letter: "A0", point: 4.0 },
        { letter: "A-", point: 3.7 },
        { letter: "B+", point: 3.3 },
        { letter: "B0", point: 3.0 },
        { letter: "B-", point: 2.7 },
        { letter: "C+", point: 2.3 },
        { letter: "C0", point: 2.0 },
        { letter: "C-", point: 1.7 },
        { letter: "D+", point: 1.3 },
        { letter: "D0", point: 1.0 },
        { letter: "D-", point: 0.7 },
        { letter: "F", point: 0.0 }
      ],
      "4.5": [
        { letter: "A+", point: 4.5 },
        { letter: "A0", point: 4.0 },
        { letter: "A-", point: 3.7 },
        { letter: "B+", point: 3.5 },
        { letter: "B0", point: 3.0 },
        { letter: "B-", point: 2.7 },
        { letter: "C+", point: 2.5 },
        { letter: "C0", point: 2.0 },
        { letter: "C-", point: 1.7 },
        { letter: "D+", point: 1.5 },
        { letter: "D0", point: 1.0 },
        { letter: "D-", point: 0.7 },
        { letter: "F", point: 0.0 }
      ]
    };

    const courseForm = document.getElementById("courseForm");
    const courseNameInput = document.getElementById("courseName");
    const creditInput = document.getElementById("credit");
    const gradeSelect = document.getElementById("grade");
    const gradeScaleSelect = document.getElementById("gradeScale");
    const requiredCreditsInput = document.getElementById("requiredCredits");
    const courseList = document.getElementById("courseList");
    const completedCreditsEl = document.getElementById("completedCredits");
    const remainingCreditsEl = document.getElementById("remainingCredits");
    const gpaEl = document.getElementById("gpa");
    const progressPercentEl = document.getElementById("progressPercent");
    const progressFillEl = document.getElementById("progressFill");
    const clearButton = document.getElementById("clearButton");

    let courses = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    const savedRequiredCredits = localStorage.getItem(REQUIRED_KEY);
    const savedScale = localStorage.getItem(SCALE_KEY);

    if (savedRequiredCredits !== null) {
      requiredCreditsInput.value = savedRequiredCredits;
    }

    if (savedScale !== null && gradeTables[savedScale]) {
      gradeScaleSelect.value = savedScale;
    }

    // 예전 버전에서 저장된 { grade: 4.3 } 형태를 { letter: "A+" } 형태로 변환합니다.
    courses = courses.map(course => {
      if (course.letter) return course;

      const oldPoint = Number(course.grade);
      const oldGrade = gradeTables["4.3"].find(item => Number(item.point) === oldPoint);

      return {
        name: course.name,
        credit: course.credit,
        letter: oldGrade ? oldGrade.letter : "F"
      };
    });

    function getCurrentScale() {
      return gradeScaleSelect.value;
    }

    function getCurrentGradeTable() {
      return gradeTables[getCurrentScale()];
    }

    function getGradePoint(letter) {
      const grade = getCurrentGradeTable().find(item => item.letter === letter);
      return grade ? grade.point : 0;
    }

    function fillGradeOptions() {
      const previousLetter = gradeSelect.value || "A+";
      gradeSelect.innerHTML = "";

      getCurrentGradeTable().forEach(item => {
        const option = document.createElement("option");
        option.value = item.letter;
        option.textContent = `${item.letter} (${item.point.toFixed(1)})`;
        gradeSelect.appendChild(option);
      });

      const stillExists = getCurrentGradeTable().some(item => item.letter === previousLetter);
      gradeSelect.value = stillExists ? previousLetter : "A+";
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(courses));
      localStorage.setItem(REQUIRED_KEY, requiredCreditsInput.value || "0");
      localStorage.setItem(SCALE_KEY, getCurrentScale());
    }

    function calculateSummary() {
      const requiredCredits = Number(requiredCreditsInput.value) || 0;
      const completedCredits = courses.reduce((sum, course) => sum + Number(course.credit), 0);
      const weightedScore = courses.reduce((sum, course) => {
        return sum + Number(course.credit) * getGradePoint(course.letter);
      }, 0);

      const gpa = completedCredits > 0 ? weightedScore / completedCredits : 0;
      const remainingCredits = Math.max(requiredCredits - completedCredits, 0);
      const progress = requiredCredits > 0 ? Math.min((completedCredits / requiredCredits) * 100, 100) : 0;

      completedCreditsEl.textContent = completedCredits.toFixed(1).replace(".0", "");
      remainingCreditsEl.textContent = remainingCredits.toFixed(1).replace(".0", "");
      gpaEl.textContent = `${gpa.toFixed(2)} / ${Number(getCurrentScale()).toFixed(1)}`;
      progressPercentEl.textContent = `${progress.toFixed(1).replace(".0", "")}%`;
      progressFillEl.style.width = `${progress}%`;

      if (remainingCredits === 0 && requiredCredits > 0) {
        remainingCreditsEl.classList.add("done");
        remainingCreditsEl.classList.remove("remaining");
      } else {
        remainingCreditsEl.classList.add("remaining");
        remainingCreditsEl.classList.remove("done");
      }
    }

    function renderCourses() {
      courseList.innerHTML = "";

      if (courses.length === 0) {
        courseList.innerHTML = '<div class="empty-message">아직 입력된 과목이 없습니다. 위 입력창에서 과목을 추가하세요.</div>';
        calculateSummary();
        return;
      }

      courses.forEach((course, index) => {
        const item = document.createElement("div");
        item.className = "course-item";
        const gradePoint = getGradePoint(course.letter);

        item.innerHTML = `
          <div>
            <div class="course-name">${escapeHTML(course.name)}</div>
            <div class="course-meta">${Number(course.credit).toFixed(1).replace(".0", "")}학점 · ${course.letter} (${gradePoint.toFixed(1)})</div>
          </div>
          <div class="badge">${Number(course.credit).toFixed(1).replace(".0", "")}학점</div>
          <div class="badge">${course.letter} ${gradePoint.toFixed(1)}</div>
          <button class="delete-button" type="button" data-index="${index}">삭제</button>
        `;

        courseList.appendChild(item);
      });

      calculateSummary();
    }

    function escapeHTML(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    courseForm.addEventListener("submit", event => {
      event.preventDefault();

      const name = courseNameInput.value.trim();
      const credit = Number(creditInput.value);
      const letter = gradeSelect.value;

      if (!name || credit <= 0 || !letter) {
        alert("강의명, 학점, 점수를 올바르게 입력하세요.");
        return;
      }

      courses.push({ name, credit, letter });
      saveData();
      renderCourses();

      courseForm.reset();
      fillGradeOptions();
      gradeSelect.value = "A+";
      courseNameInput.focus();
    });

    courseList.addEventListener("click", event => {
      if (!event.target.classList.contains("delete-button")) return;

      const index = Number(event.target.dataset.index);
      courses.splice(index, 1);
      saveData();
      renderCourses();
    });

    requiredCreditsInput.addEventListener("input", () => {
      saveData();
      calculateSummary();
    });

    gradeScaleSelect.addEventListener("change", () => {
      fillGradeOptions();
      saveData();
      renderCourses();
    });

    clearButton.addEventListener("click", () => {
      const confirmed = confirm("입력된 과목을 모두 삭제할까요?");
      if (!confirmed) return;

      courses = [];
      saveData();
      renderCourses();
    });

    fillGradeOptions();
    saveData();
    renderCourses();
  </script>
</body>
</html>
